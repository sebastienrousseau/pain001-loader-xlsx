name: CI

on:
  push:
    branches: [main, "feat/**"]
    tags: ["v*.*.*"]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install pain001 + this package + dev tools
        run: |
          python -m pip install --upgrade pip
          # The plugin substrate that powers auto-discovery lands in
          # pain001 v0.0.54. While that release is in flight, install
          # pain001 from its feat/v0.0.54 branch. Once pain001 v0.0.54
          # is on PyPI this block reduces to a single ``pip install
          # pain001>=0.0.54,<1`` line.
          if pip install "pain001>=0.0.54,<1" 2>/dev/null; then
            echo "Installed pain001 from PyPI."
          else
            echo "pain001 v0.0.54 not yet on PyPI; installing from git."
            pip install "pain001 @ git+https://github.com/sebastienrousseau/pain001@feat/v0.0.54"
          fi
          pip install -e ".[dev]"

      - name: Run tests with 100% coverage gate
        run: |
          pytest tests/ \
            --cov=pain001_loader_xlsx --cov-branch \
            --cov-report=term-missing \
            --cov-report=xml \
            --cov-fail-under=100

      - name: Enforce 100% docstring coverage
        run: interrogate -c pyproject.toml pain001_loader_xlsx

  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install pain001 + this package + dev tools
        run: |
          python -m pip install --upgrade pip
          # Same fallback as the test job: PyPI first, git+main second.
          if pip install "pain001>=0.0.54,<1" 2>/dev/null; then
            echo "Installed pain001 from PyPI."
          else
            echo "pain001 v0.0.54 not yet on PyPI; installing from git."
            pip install "pain001 @ git+https://github.com/sebastienrousseau/pain001@feat/v0.0.54"
          fi
          pip install -e ".[dev]"

      - name: Ruff check
        run: ruff check pain001_loader_xlsx/ tests/ examples/

      - name: Ruff format check
        run: ruff format --check pain001_loader_xlsx/ tests/ examples/

      - name: Mypy
        run: mypy pain001_loader_xlsx/

  release:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: [test, lint]
    if: startsWith(github.ref, 'refs/tags/v')
    environment:
      name: pypi
      url: https://pypi.org/p/pain001-loader-xlsx
    permissions:
      contents: write
      id-token: write  # OIDC for PyPI trusted publishing
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Verify tag matches package version
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PKG=$(python -c "import sys; sys.path.insert(0,'.'); import pain001_loader_xlsx; print(pain001_loader_xlsx.__version__)")
          if [ "$TAG" != "$PKG" ]; then
            echo "Tag $GITHUB_REF_NAME does not match package version $PKG" >&2
            exit 1
          fi

      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip
          pip install build twine

      - name: Build sdist + wheel
        run: python -m build

      - name: Twine check
        run: twine check dist/*

      - name: Extract release notes
        id: notes
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          NOTE_PATH="releases/v${VERSION}.md"
          if [ ! -f "$NOTE_PATH" ]; then
            echo "Release notes missing at $NOTE_PATH" >&2
            exit 1
          fi
          echo "path=$NOTE_PATH" >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          body_path: ${{ steps.notes.outputs.path }}
          files: dist/*

      - name: Publish to PyPI via OIDC trusted publishing
        uses: pypa/gh-action-pypi-publish@release/v1
